      <ellipse cx="0" cy="0" rx="42" ry="16"/>
      <ellipse cx="0" cy="0" rx="42" ry="16" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="42" ry="16" transform="rotate(120)"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    </g>

    <!-- binary digits scattered -->
    <g stroke="none" fill="#ffffff" font-family="'Fira Code', monospace" font-size="13" letter-spacing="2">
      <text x="20" y="330">01001 10110</text>
      <text x="480" y="60">10110 01011</text>
      <text x="330" y="330">1101001</text>
    </g>

    <!-- statistical trend line + data points, lower-left -->
    <g stroke="#FF6B35" stroke-width="1.6">
      <polyline fill="none" points="20,368 80,352 140,362 200,326 260,340 320,300 380,314 440,278"/>
    </g>
    <g fill="#FF6B35" stroke="none">
      <circle cx="80" cy="352" r="2.4"/>
      <circle cx="200" cy="326" r="2.4"/>
      <circle cx="320" cy="300" r="2.4"/>
      <circle cx="440" cy="278" r="2.4"/>
    </g>

