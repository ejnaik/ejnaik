    <rect x="908" y="213" width="104" height="52" rx="3" fill="#ffffff"/>
    <!-- bar chart on screen -->
    <rect x="920" y="245" width="10" height="14" fill="#FF6B35"/>
    <rect x="936" y="235" width="10" height="24" fill="#0B1330"/>
    <rect x="952" y="225" width="10" height="34" fill="#FF6B35"/>
    <rect x="968" y="240" width="10" height="19" fill="#0B1330"/>
    <rect x="984" y="230" width="10" height="29" fill="#FF6B35"/>
