  <text x="63" y="63" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="#0B1330">EN</text>

  <!-- Top-right small logo tag -->
  <g>
    <rect x="1058" y="38" width="10" height="10" fill="#FF6B35" transform="rotate(45 1063 43)"/>
    <text x="1080" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="15" letter-spacing="2" font-weight="700" fill="#ffffff">EJISAY.NAIK</text>
  </g>

  <!-- Headline -->
  <text x="60" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="1">
    <tspan fill="#FF6B35">EJISAY</tspan><tspan fill="#ffffff"> NAIK</tspan>
  </text>
  <text x="60" y="205" font-family="'Segoe UI', Arial, sans-serif" font-size="27" font-weight="700" letter-spacing="4" fill="#ffffff">
    DATA SCIENCE &amp; AI/ML
