<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020111"/>
      <stop offset="35%" stop-color="#050a30"/>
      <stop offset="65%" stop-color="#0a2472"/>
      <stop offset="100%" stop-color="#0e6ba8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7f5cff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7f5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#a8edfc"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <circle cx="190" cy="70" r="220" fill="url(#glow1)"/>
  <circle cx="1030" cy="230" r="240" fill="url(#glow2)"/>

  <!-- Neural network vector background -->
  <g stroke="#4fd8ff" stroke-width="1" opacity="0.28">
    <line x1="60" y1="230" x2="180" y2="150"/>
    <line x1="180" y1="150" x2="120" y2="60"/>
    <line x1="180" y1="150" x2="300" y2="190"/>
    <line x1="300" y1="190" x2="380" y2="90"/>
    <line x1="300" y1="190" x2="410" y2="240"/>
    <line x1="120" y1="60" x2="260" y2="40"/>
    <line x1="260" y1="40" x2="380" y2="90"/>
    <line x1="410" y1="240" x2="520" y2="200"/>
    <line x1="380" y1="90" x2="520" y2="120"/>
    <line x1="520" y1="120" x2="520" y2="200"/>
    <line x1="820" y1="200" x2="900" y2="130"/>
    <line x1="900" y1="130" x2="1000" y2="170"/>
    <line x1="900" y1="130" x2="960" y2="50"/>
    <line x1="960" y1="50" x2="1080" y2="80"/>
    <line x1="1000" y1="170" x2="1110" y2="150"/>
    <line x1="1080" y1="80" x2="1110" y2="150"/>
    <line x1="1000" y1="170" x2="1060" y2="250"/>
    <line x1="820" y1="200" x2="760" y2="260"/>
  </g>
  <g fill="#7fe9ff">
    <circle cx="60" cy="230" r="3.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="150" r="3.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="60" r="2.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="190" r="3.4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="90" r="2.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="40" r="2.4"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="240" r="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="120" r="2.8"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="200" r="3.2"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="200" r="3.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="130" r="3.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="50" r="2.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="80" r="2.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="170" r="3.4"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1110" cy="150" r="2.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="250" r="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="260" r="2.4"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Circuit corner accents -->
  <g stroke="#00d2ff" stroke-width="1.4" fill="none" opacity="0.5">
    <path d="M20,20 L20,50 L50,50 L50,90" />
    <circle cx="50" cy="90" r="3" fill="#00d2ff"/>
    <path d="M1180,280 L1180,250 L1150,250 L1150,210" />
    <circle cx="1150" cy="210" r="3" fill="#00d2ff"/>
  </g>

  <!-- Title -->
  <text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', 'Fira Code', monospace" font-size="66" font-weight="700" letter-spacing="6" fill="url(#textGrad)" filter="url(#softGlow)">
    EJISAY NAIK
  </text>

  <!-- Subtitle -->
  <text x="600" y="192" text-anchor="middle" font-family="'Fira Code', monospace" font-size="21" letter-spacing="2" fill="#a8edfc">
    Data Science &#8226; AI / ML &#8226; Optimization
  </text>

  <!-- accent underline -->
  <rect x="480" y="212" width="240" height="2.5" fill="url(#textGrad)" opacity="0.8"/>
</svg>
