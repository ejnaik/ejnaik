  <!-- Diagonal seam line -->
  <polygon points="740,0 760,0 660,380 640,380" fill="#ffffff" opacity="0.08"/>

  <!-- Right orange panel -->
  <polygon points="760,0 1200,0 1200,380 660,380" fill="url(#orangeGrad)"/>
  <polygon points="760,0 785,0 685,380 660,380" fill="#ffffff" opacity="0.12"/>

  <!-- AI / ML watermark motifs on orange panel -->
