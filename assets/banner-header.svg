  <!-- Body copy -->
  <text x="60" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#C9D1E0">
    Turning data into decisions — machine learning, optimization
  </text>
  <text x="60" y="262" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#C9D1E0">
    and statistics, one project at a time.
  </text>

  <!-- CTA button -->
  <rect x="60" y="286" width="192" height="46" rx="23" fill="url(#orangeGradSoft)"/>
  <text x="156" y="315" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1" fill="#0B1330">VIEW PROJECTS →</text>

  <!-- Bottom contact row -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#C9D1E0">
    <circle cx="70" cy="356" r="12" fill="#FF6B35"/>
    <path d="M64,352 L70,357 L76,352" stroke="#0B1330" stroke-width="1.6" fill="none"/>
    <rect x="64" y="351" width="12" height="9" rx="1.5" fill="none" stroke="#0B1330" stroke-width="1.6"/>
    <text x="88" y="360">ejnaik08@gmail.com</text>

    <line x1="270" y1="345" x2="270" y2="367" stroke="#ffffff" opacity="0.2"/>

    <circle cx="300" cy="356" r="12" fill="#FF6B35"/>
    <circle cx="300" cy="356" r="6" fill="none" stroke="#0B1330" stroke-width="1.6"/>
    <line x1="294" y1="356" x2="306" y2="356" stroke="#0B1330" stroke-width="1.4"/>
    <text x="318" y="360">github.com/ejnaik</text>

    <line x1="500" y1="345" x2="500" y2="367" stroke="#ffffff" opacity="0.2"/>

    <circle cx="530" cy="356" r="12" fill="#FF6B35"/>
    <path d="M530,350 c4,0 6,3 6,6 c0,4 -6,9 -6,9 c0,0 -6,-5 -6,-9 c0,-3 2,-6 6,-6 z" fill="#0B1330"/>
    <text x="548" y="360">India</text>
  </g>
