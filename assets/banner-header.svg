    <rect x="640" y="120" width="16" height="16" fill="#FF6B35" opacity="0.5" transform="rotate(45 648 128)"/>
    <rect x="600" y="260" width="26" height="26" fill="#ffffff" opacity="0.10" transform="rotate(45 613 273)"/>
    <rect x="1140" y="30" width="18" height="18" fill="#ffffff" opacity="0.25" transform="rotate(45 1149 39)"/>
    <rect x="1080" y="330" width="20" height="20" fill="#ffffff" opacity="0.18" transform="rotate(45 1090 340)"/>
