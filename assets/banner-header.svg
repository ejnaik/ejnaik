<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030014"/>
      <stop offset="24%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#231557"/>
      <stop offset="72%" stop-color="#5b2a86"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>

    <radialGradient id="blobBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M 46 0 L 0 0 0 46" fill="none" stroke="#7dd3fc" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.06"/>

  <!-- Aurora glow blobs -->
  <circle cx="140" cy="60" r="230" fill="url(#blobBlue)"/>
  <circle cx="1080" cy="60" r="240" fill="url(#blobPink)"/>
  <circle cx="220" cy="280" r="220" fill="url(#blobTeal)"/>
  <circle cx="980" cy="290" r="230" fill="url(#blobGold)"/>

  <!-- Neural network vector background -->
  <g stroke="#a5f3fc" stroke-width="1" opacity="0.3">
    <line x1="70" y1="250" x2="190" y2="170"/>
    <line x1="190" y1="170" x2="130" y2="75"/>
    <line x1="190" y1="170" x2="310" y2="205"/>
    <line x1="310" y1="205" x2="390" y2="105"/>
    <line x1="130" y1="75" x2="270" y2="50"/>
    <line x1="270" y1="50" x2="390" y2="105"/>
    <line x1="390" y1="105" x2="510" y2="140"/>
    <line x1="830" y1="215" x2="910" y2="145"/>
    <line x1="910" y1="145" x2="1010" y2="185"/>
    <line x1="910" y1="145" x2="970" y2="60"/>
    <line x1="970" y1="60" x2="1090" y2="90"/>
    <line x1="1010" y1="185" x2="1120" y2="165"/>
    <line x1="1010" y1="185" x2="1070" y2="265"/>
  </g>
  <g fill="#fef9c3">
    <circle cx="70" cy="250" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="190" cy="170" r="3.4"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="130" cy="75" r="2.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="205" r="3.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="390" cy="105" r="2.8"><animate attributeName="opacity" values="0.4;0.95;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="270" cy="50" r="2.4"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="510" cy="140" r="2.8"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="215" r="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="910" cy="145" r="3.4"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="970" cy="60" r="2.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="1090" cy="90" r="2.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="1010" cy="185" r="3.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="165" r="2.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="1070" cy="265" r="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Twinkling gold sparkles -->
  <g fill="#facc15">
    <circle cx="340" cy="40" r="2"><animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="55" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="3.1s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle cx="150" cy="200" r="1.8"><animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="1.1s"/></circle>
    <circle cx="1040" cy="230" r="2"><animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="620" cy="35" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="3.3s" repeatCount="indefinite" begin="1.4s"/></circle>
  </g>

  <!-- Circuit corner accents -->
  <g stroke="#38bdf8" stroke-width="1.4" fill="none" opacity="0.55">
    <path d="M24,24 L24,56 L56,56 L56,98"/>
    <circle cx="56" cy="98" r="3" fill="#38bdf8"/>
    <path d="M1176,296 L1176,264 L1144,264 L1144,222"/>
    <circle cx="1144" cy="222" r="3" fill="#f0abfc"/>
  </g>

  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" font-family="'Segoe UI', 'Fira Code', monospace" font-size="68" font-weight="800" letter-spacing="6" fill="url(#textGrad)" filter="url(#softGlow)">
    EJISAY NAIK
  </text>

  <!-- Accent bar -->
  <rect x="470" y="182" width="260" height="3" rx="1.5" fill="url(#barGrad)"/>

  <!-- Subtitle -->
  <text x="600" y="216" text-anchor="middle" font-family="'Fira Code', monospace" font-size="21" letter-spacing="2" fill="#e0e7ff">
    Data Science &#8226; AI / ML &#8226; Optimization
  </text>

  <!-- Role chip -->
  <rect x="463" y="238" width="274" height="32" rx="16" fill="#0b1026" fill-opacity="0.55" stroke="#7dd3fc" stroke-opacity="0.5"/>
  <text x="600" y="259" text-anchor="middle" font-family="'Fira Code', monospace" font-size="13" letter-spacing="1.5" fill="#a5f3fc">
    OPEN TO COLLABORATE &#8226; INDIA 🇮🇳
  </text>
</svg>
