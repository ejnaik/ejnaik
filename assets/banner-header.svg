      <line x1="0" y1="0" x2="0" y2="70" stroke-width="1"/>
      <line x1="0" y1="70" x2="105" y2="70" stroke-width="1"/>
    </g>
    <g fill="#ffffff" stroke="none">
      <circle cx="248" cy="230" r="2"/>
      <circle cx="266" cy="205" r="2"/>
      <circle cx="284" cy="222" r="2"/>
      <circle cx="302" cy="190" r="2"/>
      <circle cx="320" cy="212" r="2"/>
      <circle cx="255" cy="215" r="2"/>
