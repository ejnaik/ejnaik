<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1330"/>
      <stop offset="100%" stop-color="#182755"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="100%" stop-color="#E85D2C"/>
    </linearGradient>
    <linearGradient id="orangeGradSoft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <clipPath id="panelClip">
      <polygon points="760,0 1200,0 1200,380 660,380"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#navyBg)"/>

  <!-- AI / ML watermark motifs -->
  <g fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.07">
    <!-- neural network diagram, left -->
    <g transform="translate(120,60) scale(1.1)">
      <circle cx="0" cy="10" r="5"/><circle cx="0" cy="45" r="5"/><circle cx="0" cy="80" r="5"/>
      <circle cx="55" cy="0" r="5"/><circle cx="55" cy="35" r="5"/><circle cx="55" cy="70" r="5"/><circle cx="55" cy="105" r="5"/>
      <circle cx="110" cy="20" r="5"/><circle cx="110" cy="60" r="5"/><circle cx="110" cy="95" r="5"/>
      <line x1="0" y1="10" x2="55" y2="0"/><line x1="0" y1="10" x2="55" y2="35"/><line x1="0" y1="10" x2="55" y2="70"/>
      <line x1="0" y1="45" x2="55" y2="0"/><line x1="0" y1="45" x2="55" y2="35"/><line x1="0" y1="45" x2="55" y2="70"/><line x1="0" y1="45" x2="55" y2="105"/>
      <line x1="0" y1="80" x2="55" y2="35"/><line x1="0" y1="80" x2="55" y2="70"/><line x1="0" y1="80" x2="55" y2="105"/>
      <line x1="55" y1="0" x2="110" y2="20"/><line x1="55" y1="35" x2="110" y2="20"/><line x1="55" y1="35" x2="110" y2="60"/>
      <line x1="55" y1="70" x2="110" y2="60"/><line x1="55" y1="70" x2="110" y2="95"/><line x1="55" y1="105" x2="110" y2="95"/>
    </g>

    <!-- CPU / chip icon, bottom-left -->
    <g transform="translate(140,270)">
      <rect x="0" y="0" width="70" height="70" rx="6"/>
      <rect x="18" y="18" width="34" height="34" rx="3"/>
      <line x1="14" y1="-14" x2="14" y2="0"/><line x1="35" y1="-14" x2="35" y2="0"/><line x1="56" y1="-14" x2="56" y2="0"/>
      <line x1="14" y1="70" x2="14" y2="84"/><line x1="35" y1="70" x2="35" y2="84"/><line x1="56" y1="70" x2="56" y2="84"/>
      <line x1="-14" y1="14" x2="0" y2="14"/><line x1="-14" y1="35" x2="0" y2="35"/><line x1="-14" y1="56" x2="0" y2="56"/>
      <line x1="70" y1="14" x2="84" y2="14"/><line x1="70" y1="35" x2="84" y2="35"/><line x1="70" y1="56" x2="84" y2="56"/>
    </g>

    <!-- brain-circuit icon, center -->
    <g transform="translate(430,40) scale(0.9)">
      <path d="M40,10 C20,10 8,25 8,42 C8,55 15,62 15,70 C15,82 25,90 40,90 C55,90 65,82 65,70 C65,62 72,55 72,42 C72,25 60,10 40,10 Z"/>
      <path d="M40,20 L40,80 M25,30 L55,30 M22,50 L58,50 M28,68 L52,68"/>
      <circle cx="25" cy="30" r="2.4" fill="#ffffff"/>
      <circle cx="55" cy="50" r="2.4" fill="#ffffff"/>
      <circle cx="30" cy="68" r="2.4" fill="#ffffff"/>
    </g>

    <!-- atom icon, upper-right of text zone -->
