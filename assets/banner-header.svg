      <line x1="960" y1="190" x2="1030" y2="205"/>
      <line x1="960" y1="190" x2="895" y2="130"/>
    </g>
    <g fill="#ffffff">
      <circle cx="1010" cy="120" r="6"/>
      <circle cx="1030" cy="205" r="5"/>
      <circle cx="895" cy="130" r="5"/>
    </g>
  </g>

  <!-- Top-left monogram badge -->
