      <circle cx="50" cy="0" r="5"/><circle cx="50" cy="35" r="5"/><circle cx="50" cy="70" r="5"/>
      <circle cx="100" cy="20" r="5"/><circle cx="100" cy="55" r="5"/>
      <line x1="0" y1="10" x2="50" y2="0"/><line x1="0" y1="10" x2="50" y2="35"/>
      <line x1="0" y1="45" x2="50" y2="35"/><line x1="0" y1="45" x2="50" y2="70"/>
      <line x1="50" y1="0" x2="100" y2="20"/><line x1="50" y1="35" x2="100" y2="20"/><line x1="50" y1="35" x2="100" y2="55"/>
